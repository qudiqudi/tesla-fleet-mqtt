# tesla-fleet-mqtt — self-hosted Tesla Fleet telemetry + commands over MQTT
# See README.md for the full setup. All config comes from .env.
#
#   tesla-config-init      renders config/config.json from the template + .env (runs once per up)
#   tesla-fleet-telemetry  receives the car's mTLS telemetry stream, publishes state to MQTT
#   tesla-http-proxy       signs & forwards vehicle commands to the Fleet API (local only)
#   tesla-cmd-bridge       subscribes <base>/cmd/# and calls the proxy
#   tesla-pubkey           serves the 3P public key for partner registration
#   mosquitto              MQTT broker (remove this service if you bring your own)

x-common: &common
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  networks:
    - tesla

services:

  mosquitto:
    <<: *common
    image: eclipse-mosquitto:2.0.22
    container_name: mosquitto
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ${STACK_DIR:-.}/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ${STACK_DIR:-.}/mosquitto/config/passwd:/mosquitto/config/passwd:ro
      - ${STACK_DIR:-.}/mosquitto/data:/mosquitto/data
      - ${STACK_DIR:-.}/mosquitto/log:/mosquitto/log

  tesla-config-init:
    container_name: tesla-config-init
    image: python:3.12.13-slim
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: "no"
    environment:
      TELEMETRY_HOST: ${TELEMETRY_HOST}
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TOPIC_BASE: ${MQTT_TOPIC_BASE}
    volumes:
      - ${STACK_DIR:-.}/templates:/templates:ro
      - ${STACK_DIR:-.}/config:/config
    command:
      - python
      - -c
      - "import os; open('/config/config.json','w').write(os.path.expandvars(open('/templates/config.json.template').read()))"

  tesla-fleet-telemetry:
    <<: *common
    image: tesla/fleet-telemetry:v0.9.0
    container_name: tesla-fleet-telemetry
    user: "${PUID:-1000}:${PGID:-1000}"
    depends_on:
      tesla-config-init:
        condition: service_completed_successfully
    command:
      - /fleet-telemetry
      - -config=/etc/fleet-telemetry/config.json
    ports:
      - "${TELEMETRY_BIND:-0.0.0.0}:${TELEMETRY_PORT:-443}:4443"
    volumes:
      - ${STACK_DIR:-.}/config/config.json:/etc/fleet-telemetry/config.json:ro
      - ${STACK_DIR:-.}/certs:/certs:ro

  tesla-http-proxy:
    <<: *common
    image: tesla/vehicle-command:0.4.1
    container_name: tesla-http-proxy
    user: "${PUID:-1000}:${PGID:-1000}"
    command:
      - -tls-key
      - /config/tls-key.pem
      - -cert
      - /config/tls-cert.pem
      - -key-file
      - /keys/fleet-key.pem
      - -host
      - 0.0.0.0
      - -port
      - "4443"
    ports:
      - "127.0.0.1:${PROXY_PORT:-4443}:4443"
    volumes:
      - ${STACK_DIR:-.}/proxy:/config:ro
      - ${STACK_DIR:-.}/keys:/keys:ro

  tesla-cmd-bridge:
    <<: *common
    build: ${STACK_DIR:-.}/bridge
    container_name: tesla-cmd-bridge
    user: "${PUID:-1000}:${PGID:-1000}"
    depends_on:
      - tesla-http-proxy
    environment:
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TOPIC_BASE: ${MQTT_TOPIC_BASE}
      PROXY_URL: https://tesla-http-proxy:4443
      PROXY_CACERT: /certs/proxy-ca.pem
      TESLA_VIN: ${TESLA_VIN}
      TESLA_CLIENT_ID: ${TESLA_CLIENT_ID}
      TESLA_CLIENT_SECRET: ${TESLA_CLIENT_SECRET}
      TESLA_REFRESH_TOKEN: ${TESLA_REFRESH_TOKEN}
      TESLA_AUTH_URL: ${TESLA_AUTH_URL}
      REFRESH_TOKEN_FILE: /data/refresh_token
    volumes:
      - ${STACK_DIR:-.}/proxy/tls-cert.pem:/certs/proxy-ca.pem:ro
      - tesla-bridge-data:/data

  # Optional historian: streams MQTT telemetry into InfluxDB 2.x. Enable with COMPOSE_PROFILES=history.
  tesla-influx:
    <<: *common
    build: ${STACK_DIR:-.}/historian
    container_name: tesla-influx
    profiles: ["history"]
    depends_on:
      - tesla-fleet-telemetry
    environment:
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TOPIC_BASE: ${MQTT_TOPIC_BASE}
      INFLUX_URL: ${INFLUX_URL:-http://influxdb:8086}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-tesla}
      INFLUX_MEASUREMENT: ${INFLUX_MEASUREMENT:-vehicle}

  # Optional sessionizer: derives drive/charge/park sessions into MariaDB. Profile "history".
  tesla-sessionizer:
    <<: *common
    build: ${STACK_DIR:-.}/sessionizer
    container_name: tesla-sessionizer
    profiles: ["history"]
    depends_on:
      - tesla-fleet-telemetry
    environment:
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TOPIC_BASE: ${MQTT_TOPIC_BASE}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-tesla}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-tesla}

  # Optional: write telemetry into teslalogger's schema (drives teslalogger's own dashboards).
  # Writes to the DB named by TLW_DB_NAME (a copy of teslalogger). Profile "history".
  tesla-tlwriter:
    <<: *common
    build: ${STACK_DIR:-.}/tlwriter
    container_name: tesla-tlwriter
    profiles: ["history"]
    depends_on:
      - tesla-fleet-telemetry
    environment:
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TOPIC_BASE: ${MQTT_TOPIC_BASE}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-tesla}
      DB_PASSWORD: ${DB_PASSWORD}
      TLW_DB_NAME: ${TLW_DB_NAME:-teslalogger}
      TESLA_VIN: ${TESLA_VIN}
      # pos row cadence while driving (s); keep in sync with register-telemetry Location interval
      POS_DRIVE_INTERVAL: ${POS_DRIVE_INTERVAL:-1}
      # charging-row cadence (s) -> resolution of the charge curves
      CHARGE_ROW_INTERVAL: ${CHARGE_ROW_INTERVAL:-10}
      # distance unit: auto (follow car) | metric | imperial (force; use if firmware misreports)
      TLW_DISTANCE_UNIT: ${TLW_DISTANCE_UNIT:-auto}
      # publish derived/normalised live state to <base>/<vin>/ha/* for Home Assistant
      # (the tesla-ha-discovery service points HA entities at these). 1=on, 0=off.
      HA_PUBLISH: ${HA_PUBLISH:-1}
      # geofencing is HA-native: tlwriter publishes GPS and HA's zones resolve home/work/etc.

  # Home Assistant MQTT discovery: makes the car appear in HA as a device with sensors,
  # switches, numbers and a device tracker, fed by the telemetry stream + tlwriter's ha/*
  # topics + the command bridge. Stateless; republishes periodically. Profile "ha" (also
  # enable "history" so tlwriter publishes the derived ha/* topics these entities read).
  tesla-ha-discovery:
    <<: *common
    build: ${STACK_DIR:-.}/discovery
    container_name: tesla-ha-discovery
    profiles: ["ha"]
    depends_on:
      - tesla-fleet-telemetry
    environment:
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TOPIC_BASE: ${MQTT_TOPIC_BASE}
      TESLA_VIN: ${TESLA_VIN}
      HA_DISCOVERY_PREFIX: ${HA_DISCOVERY_PREFIX:-homeassistant}
      HA_DEVICE_NAME: ${HA_DEVICE_NAME:-Tesla}
      HA_DEVICE_MODEL: ${HA_DEVICE_MODEL:-Tesla}
      HA_DEVICE_MANUFACTURER: ${HA_DEVICE_MANUFACTURER:-Tesla}
      HA_DISCOVERY_INTERVAL: ${HA_DISCOVERY_INTERVAL:-300}

  # Register the fleet telemetry config on every deploy (idempotent — re-registering the same
  # field set is a no-op), so field-list changes apply without a manual exec. One-shot. It waits
  # for the bridge's shared access token (ACCESS_TOKEN_REQUIRED=1) so it never refreshes — and
  # forks — the refresh-token lineage itself.
  tesla-register:
    <<: *common
    build: ${STACK_DIR:-.}/tools
    container_name: tesla-register
    restart: "no"
    depends_on:
      - tesla-http-proxy
      - tesla-cmd-bridge
    volumes:
      - ${STACK_DIR:-.}/scripts:/app/scripts:ro
      - ${STACK_DIR:-.}/proxy:/app/proxy:ro
      - ${STACK_DIR:-.}/certs:/app/certs:ro
      - tesla-bridge-data:/bridge-data:ro
    environment:
      TESLA_VIN: ${TESLA_VIN}
      TELEMETRY_HOST: ${TELEMETRY_HOST}
      TELEMETRY_PORT: ${TELEMETRY_PORT}
      TESLA_AUTH_URL: ${TESLA_AUTH_URL}
      PROXY_URL: https://tesla-http-proxy:4443
      LOCATION_INTERVAL: ${LOCATION_INTERVAL:-1}
      SPEED_INTERVAL: ${SPEED_INTERVAL:-1}
      BRIDGE_ACCESS_TOKEN_FILE: /bridge-data/access_token
      ACCESS_TOKEN_REQUIRED: "1"
    command:
      - sh
      - -c
      - 'i=0; until [ -s /bridge-data/access_token ]; do i=$((i+1)); [ "$i" -ge 60 ] && { echo "register: bridge token not ready after 120s, skipping"; exit 0; }; sleep 2; done; exec bash /app/scripts/register-telemetry.sh'

  # Tools container: run the helper scripts here via `docker exec` so Dockhand-injected
  # secrets stay in the container env (no secret file, no docker inspect). Profile "tools".
  tesla-tools:
    <<: *common
    build: ${STACK_DIR:-.}/tools
    container_name: tesla-tools
    profiles: ["tools"]
    volumes:
      - ${STACK_DIR:-.}/scripts:/app/scripts:ro
      - ${STACK_DIR:-.}/migration:/app/migration:ro
      - ${STACK_DIR:-.}/proxy:/app/proxy:ro
      - ${STACK_DIR:-.}/certs:/app/certs:ro
      - ${STACK_DIR:-.}/db:/app/db:ro
      # read the bridge's current access token so the scripts don't refresh (and fork) the lineage
      - tesla-bridge-data:/bridge-data:ro
    environment:
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TOPIC_BASE: ${MQTT_TOPIC_BASE}
      BRIDGE_ACCESS_TOKEN_FILE: /bridge-data/access_token
      PROXY_URL: https://tesla-http-proxy:4443
      TESLA_VIN: ${TESLA_VIN}
      TESLA_CLIENT_ID: ${TESLA_CLIENT_ID}
      TESLA_CLIENT_SECRET: ${TESLA_CLIENT_SECRET}
      TESLA_REFRESH_TOKEN: ${TESLA_REFRESH_TOKEN}
      TESLA_REDIRECT_URI: ${TESLA_REDIRECT_URI}
      TESLA_AUTH_URL: ${TESLA_AUTH_URL}
      FLEET_API_BASE: ${FLEET_API_BASE}
      TELEMETRY_HOST: ${TELEMETRY_HOST}
      TELEMETRY_PORT: ${TELEMETRY_PORT}
      PARTNER_DOMAIN: ${PARTNER_DOMAIN}
      INFLUX_URL: ${INFLUX_URL:-http://influxdb:8086}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-tesla}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-tesla}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-tesla}
      # teslalogger source DB for the one-time backfill (optional)
      TL_DB_HOST: ${TL_DB_HOST:-teslalogger-db}
      TL_DB_USER: ${TL_DB_USER:-teslalogger}
      TL_DB_PASSWORD: ${TL_DB_PASSWORD:-}
      TL_DB_NAME: ${TL_DB_NAME:-teslalogger}

  tesla-pubkey:
    <<: *common
    image: nginx:1.31.1-alpine
    container_name: tesla-pubkey
    ports:
      - "${PUBKEY_PORT:-8088}:80"
    volumes:
      - ${STACK_DIR:-.}/pubkey:/usr/share/nginx/html:ro

networks:
  tesla:
    name: tesla

volumes:
  tesla-bridge-data:
