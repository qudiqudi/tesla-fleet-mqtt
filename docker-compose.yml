# tesla-fleet-mqtt — self-hosted Tesla Fleet telemetry + commands over MQTT
# See README.md for the full setup. All config comes from .env.
#
#   tesla-config-init      renders config/config.json from the template + .env (runs once per up)
#   tesla-fleet-telemetry  receives the car's mTLS telemetry stream, publishes state to MQTT
#   tesla-http-proxy       signs & forwards vehicle commands to the Fleet API (local only)
#   tesla-cmd-bridge       subscribes <base>/cmd/# and calls the proxy
#   tesla-pubkey           serves the 3P public key for partner registration
#   mosquitto              MQTT broker (remove this service if you bring your own)

x-common: &common
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  networks:
    - tesla

services:

  mosquitto:
    <<: *common
    image: eclipse-mosquitto:2.0.22
    container_name: mosquitto
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ${STACK_DIR:-.}/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ${STACK_DIR:-.}/mosquitto/config/passwd:/mosquitto/config/passwd:ro
      - ${STACK_DIR:-.}/mosquitto/data:/mosquitto/data
      - ${STACK_DIR:-.}/mosquitto/log:/mosquitto/log

  tesla-config-init:
    container_name: tesla-config-init
    image: python:3.12.13-slim
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: "no"
    environment:
      TELEMETRY_HOST: ${TELEMETRY_HOST}
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TOPIC_BASE: ${MQTT_TOPIC_BASE}
    volumes:
      - ${STACK_DIR:-.}/templates:/templates:ro
      - ${STACK_DIR:-.}/config:/config
    command:
      - python
      - -c
      - "import os; open('/config/config.json','w').write(os.path.expandvars(open('/templates/config.json.template').read()))"

  tesla-fleet-telemetry:
    <<: *common
    image: tesla/fleet-telemetry:v0.9.0
    container_name: tesla-fleet-telemetry
    user: "${PUID:-1000}:${PGID:-1000}"
    depends_on:
      tesla-config-init:
        condition: service_completed_successfully
    command:
      - /fleet-telemetry
      - -config=/etc/fleet-telemetry/config.json
    ports:
      - "${TELEMETRY_BIND:-0.0.0.0}:${TELEMETRY_PORT:-443}:4443"
    volumes:
      - ${STACK_DIR:-.}/config/config.json:/etc/fleet-telemetry/config.json:ro
      - ${STACK_DIR:-.}/certs:/certs:ro

  tesla-http-proxy:
    <<: *common
    image: tesla/vehicle-command:0.4.1
    container_name: tesla-http-proxy
    user: "${PUID:-1000}:${PGID:-1000}"
    command:
      - -tls-key
      - /config/tls-key.pem
      - -cert
      - /config/tls-cert.pem
      - -key-file
      - /keys/fleet-key.pem
      - -host
      - 0.0.0.0
      - -port
      - "4443"
    ports:
      - "127.0.0.1:${PROXY_PORT:-4443}:4443"
    volumes:
      - ${STACK_DIR:-.}/proxy:/config:ro
      - ${STACK_DIR:-.}/keys:/keys:ro

  tesla-cmd-bridge:
    <<: *common
    build: ${STACK_DIR:-.}/bridge
    container_name: tesla-cmd-bridge
    user: "${PUID:-1000}:${PGID:-1000}"
    depends_on:
      - tesla-http-proxy
    environment:
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TOPIC_BASE: ${MQTT_TOPIC_BASE}
      PROXY_URL: https://tesla-http-proxy:4443
      PROXY_CACERT: /certs/proxy-ca.pem
      TESLA_VIN: ${TESLA_VIN}
      TESLA_CLIENT_ID: ${TESLA_CLIENT_ID}
      TESLA_CLIENT_SECRET: ${TESLA_CLIENT_SECRET}
      TESLA_REFRESH_TOKEN: ${TESLA_REFRESH_TOKEN}
      TESLA_AUTH_URL: ${TESLA_AUTH_URL}
    volumes:
      - ${STACK_DIR:-.}/proxy/tls-cert.pem:/certs/proxy-ca.pem:ro

  # Optional historian: streams MQTT telemetry into InfluxDB 2.x. Enable with COMPOSE_PROFILES=history.
  tesla-influx:
    <<: *common
    build: ${STACK_DIR:-.}/historian
    container_name: tesla-influx
    profiles: ["history"]
    depends_on:
      - tesla-fleet-telemetry
    environment:
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TOPIC_BASE: ${MQTT_TOPIC_BASE}
      INFLUX_URL: ${INFLUX_URL:-http://influxdb:8086}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-tesla}
      INFLUX_MEASUREMENT: ${INFLUX_MEASUREMENT:-vehicle}

  # Optional sessionizer: derives drive/charge/park sessions into MariaDB. Profile "history".
  tesla-sessionizer:
    <<: *common
    build: ${STACK_DIR:-.}/sessionizer
    container_name: tesla-sessionizer
    profiles: ["history"]
    depends_on:
      - tesla-fleet-telemetry
    environment:
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TOPIC_BASE: ${MQTT_TOPIC_BASE}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-tesla}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-tesla}

  # Tools container: run the helper scripts here via `docker exec` so Dockhand-injected
  # secrets stay in the container env (no secret file, no docker inspect). Profile "tools".
  tesla-tools:
    <<: *common
    build: ${STACK_DIR:-.}/tools
    container_name: tesla-tools
    profiles: ["tools"]
    volumes:
      - ${STACK_DIR:-.}/scripts:/app/scripts:ro
      - ${STACK_DIR:-.}/proxy:/app/proxy:ro
      - ${STACK_DIR:-.}/certs:/app/certs:ro
      - ${STACK_DIR:-.}/db:/app/db:ro
    environment:
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TOPIC_BASE: ${MQTT_TOPIC_BASE}
      PROXY_URL: https://tesla-http-proxy:4443
      TESLA_VIN: ${TESLA_VIN}
      TESLA_CLIENT_ID: ${TESLA_CLIENT_ID}
      TESLA_CLIENT_SECRET: ${TESLA_CLIENT_SECRET}
      TESLA_REFRESH_TOKEN: ${TESLA_REFRESH_TOKEN}
      TESLA_REDIRECT_URI: ${TESLA_REDIRECT_URI}
      TESLA_AUTH_URL: ${TESLA_AUTH_URL}
      FLEET_API_BASE: ${FLEET_API_BASE}
      TELEMETRY_HOST: ${TELEMETRY_HOST}
      TELEMETRY_PORT: ${TELEMETRY_PORT}
      PARTNER_DOMAIN: ${PARTNER_DOMAIN}
      INFLUX_URL: ${INFLUX_URL:-http://influxdb:8086}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-tesla}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-tesla}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-tesla}
      # teslalogger source DB for the one-time backfill (optional)
      TL_DB_HOST: ${TL_DB_HOST:-teslalogger-db}
      TL_DB_USER: ${TL_DB_USER:-teslalogger}
      TL_DB_PASSWORD: ${TL_DB_PASSWORD:-}
      TL_DB_NAME: ${TL_DB_NAME:-teslalogger}

  tesla-pubkey:
    <<: *common
    image: nginx:1.31.1-alpine
    container_name: tesla-pubkey
    ports:
      - "${PUBKEY_PORT:-8088}:80"
    volumes:
      - ${STACK_DIR:-.}/pubkey:/usr/share/nginx/html:ro

networks:
  tesla:
    name: tesla
